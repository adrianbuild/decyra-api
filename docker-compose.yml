services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: decyra-postgres
    ports:
      - "55432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: decyra
    volumes:
      - decyra_pgdata:/var/lib/postgresql/data
      - ./docker/init-test-db.sql:/docker-entrypoint-initdb.d/01-init-test-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d decyra"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Local SMTP catcher (Task 2.3). Invitation mails land here, never go
  # out. UI at http://localhost:8025, SMTP on :1025. Prod swaps the SMTP
  # host/port in config — this service is dev-only.
  mailpit:
    image: axllent/mailpit:latest
    container_name: decyra-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

volumes:
  decyra_pgdata:
