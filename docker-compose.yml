services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: decyra-postgres
    ports:
      - "55432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: decyra
    volumes:
      - decyra_pgdata:/var/lib/postgresql/data
      - ./docker/init-test-db.sql:/docker-entrypoint-initdb.d/01-init-test-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d decyra"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Local SMTP catcher (Task 2.3). Invitation mails land here, never go
  # out. UI at http://localhost:8025, SMTP on :1025. Prod swaps the SMTP
  # host/port in config — this service is dev-only.
  mailpit:
    image: axllent/mailpit:latest
    container_name: decyra-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

  # Microsoft Presidio analyzer (Task 4.5a). Custom image: the stock
  # presidio-analyzer ships English only; ours adds the German spaCy model
  # so PERSON/LOCATION NER works for German text. REST POST /analyze on
  # :3000, mapped to :5002 (PRESIDIO_URL). Standard global recognizers
  # (EMAIL/IBAN/CREDIT_CARD) are language-agnostic; German Steuer-ID /
  # Kundennummer are handled locally in app/pii.py (Presidio lacks them).
  presidio:
    build: ./docker/presidio
    container_name: decyra-presidio
    ports:
      - "5002:3000"
    restart: unless-stopped
    # Loud-failing health: the container is only "healthy" once the German
    # registry actually exposes IBAN_CODE. A misconfiguration (NLP=de but
    # registry stuck at en → pattern recognizers absent) keeps it unhealthy
    # instead of silently passing PII through. (Same spirit as the 2.2c GRANTs.)
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import json, sys, urllib.request
          d = json.load(urllib.request.urlopen("http://localhost:3000/supportedentities?language=de"))
          sys.exit(0 if "IBAN_CODE" in d else 1)
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  decyra_pgdata:
